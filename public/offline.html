<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Game Legal Tournament offline</title>
    <meta name="theme-color" content="#050807" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 70% 20%, rgba(49, 233, 129, .2), transparent 34%), #050807;
        color: #f7fff9;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(90vw, 560px);
        border: 1px solid rgba(49, 233, 129, .22);
        border-radius: 28px;
        padding: 32px;
        background: rgba(16, 24, 20, .82);
        box-shadow: 0 28px 90px rgba(0, 0, 0, .42);
      }
      span {
        color: #31e981;
        text-transform: uppercase;
        letter-spacing: .18em;
        font-size: 12px;
        font-weight: 900;
      }
      h1 {
        margin: 12px 0;
        font-size: clamp(32px, 8vw, 58px);
        line-height: .95;
        text-transform: uppercase;
      }
      p {
        color: #9bb1a2;
        line-height: 1.7;
      }
      a {
        display: inline-flex;
        margin-top: 18px;
        border-radius: 999px;
        padding: 14px 20px;
        background: linear-gradient(135deg, #31e981, #d6ff61);
        color: #041009;
        font-weight: 900;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <span>Modo offline</span>
      <h1>La cancha sigue lista</h1>
      <p>No hay conexion disponible. Si ya visitaste un torneo, vuelve a abrirlo y se mostraran los datos guardados en este dispositivo.</p>
      <a href="/">Reintentar</a>
    </main>
  </body>
</html>
